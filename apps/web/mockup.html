<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MessageEx Mockup</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #151f36 0%, #0b0f14 50%); color:#e5e7eb; }
    .card { width:min(100%,420px); background:#111827; border:1px solid #1f2937; border-radius:14px; padding:28px; box-shadow:0 18px 40px rgba(0,0,0,.35)}
    .brand{margin:0 0 4px;color:#22d3ee;font-weight:700}.status{color:#9ca3af}
    .field{display:grid;gap:6px;margin-bottom:10px;font-size:14px;color:#cbd5e1}
    input{border:1px solid #374151;background:#0f172a;color:#e5e7eb;padding:10px 12px;border-radius:10px}
    button{width:100%;border:none;border-radius:10px;padding:11px 14px;background:#4f46e5;color:white;font-weight:600}
  </style>
</head>
<body>
  <section class="card">
    <p class="brand">MessageEx</p>
    <h1>Вход в MessageEx</h1>
    <label class="field">Email<input type="email" placeholder="you@example.com"/></label>
    <label class="field">Пароль<input type="password" placeholder="••••••••"/></label>
    <button>Войти</button>
    <p class="status">Готово к авторизации</p>
  </section>
</body>
</html>
