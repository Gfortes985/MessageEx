version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: messageex-postgres
    environment:
      POSTGRES_USER: messageex
      POSTGRES_PASSWORD: messageex
      POSTGRES_DB: messageex
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: messageex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: messageex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: messageex
      MINIO_ROOT_PASSWORD: messageex123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  redis_data:
  minio_data:
